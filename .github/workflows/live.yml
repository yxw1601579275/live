name: Bilibili 24H Live

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  push-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download and Stream
        run: |
            echo "正在下载视频..."
            # 指定下载为 video.mp4 确保文件名一致
            wget -c -O video.mp4 "https://objectstorageapi.ap-southeast-1.clawcloudrun.com/szi722v0-mine/video.mp4"
            
            if [ ! -s video.mp4 ]; then
              echo "错误：下载失败！"
              exit 1
            fi
            
            echo "开始循环推流（含自动重连）..."
            # 使用 while 循环，一旦 ffmpeg 崩溃会自动重启
            # timeout 限制总运行时间为 5.5 小时
            timeout 5.5h bash -c '
              while true; do
                ffmpeg -re -i video.mp4 -c:v copy -c:a copy -f flv "${{ secrets.BILI_RTMP }}"
                echo "推流意外断开，5秒后尝试重连..."
                sleep 5
              done
            ' || true