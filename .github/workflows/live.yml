name: 24H Stable Live (CST Time & Smooth)

on:
  schedule:
    - cron: '0 */5 * * *' # 每5小时重启
  workflow_dispatch:      # 手动启动

jobs:
  push-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Video File
        id: cache-video
        uses: actions/cache@v3
        with:
          path: video.mp4
          key: video-v1

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Download Video (Only if not cached)
        if: steps.cache-video.outputs.cache-hit != 'true'
        run: |
          wget -c -O video.mp4 "https://objectstorageapi.ap-southeast-1.clawcloudrun.com/szi722v0-mine/video.mp4"

      - name: Stream with Beijing Time
        run: |
          echo "修正北京时区并开启流畅推流..."
          (while true; do echo "--- [$(date +'%H:%M:%S')] 正在推流中 ---"; sleep 300; done) &
          
          # 核心修正：设置 TZ 环境变量为亚洲/上海（北京时间）
          export TZ="Asia/Shanghai"
          
          timeout 5.5h bash -c '
            while true; do
              # 1. 限制帧率为 30fps (-r 30) 防止回放“飞快”
              # 2. 强制 3000k 码率防止网络拥塞导致卡顿
              # 3. 动态噪点 (noise) 继续保留对抗 AI
              ffmpeg -re -i video.mp4 \
                -r 30 \
                -vf "noise=alls=3:allf=t,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='\''%{localtime\:%H\\\\\:%M\\\\\:%S}'\'':x=w-220:y=30:fontsize=26:fontcolor=white:shadowcolor=black:shadowx=2" \
                -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
                -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
                -map_metadata -1 -metadata service_provider="OBS" \
                -loglevel error \
                -f flv "${{ secrets.BILI_RTMP }}" 
          
              echo "连接断开，5秒后重连..."
              sleep 5
            done
          ' || true