name: Bilibili 24H Live

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  push-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download and Stream
        run: |
          # 1. 下载 1GB 视频
          wget -c -O video.mp4 "https://objectstorageapi.ap-southeast-1.clawcloudrun.com/szi722v0-mine/video.mp4"
          
          if [ ! -s video.mp4 ]; then
            echo "下载失败！"
            exit 1
          fi

          echo "开始流畅版推流..."
          # 2. 核心修复：强制转码为 2500k 码率，解决 4500k 导致的卡顿
          # 增加 -reconnect 参数应对网络抖动
          timeout 5.5h bash -c '
            while true; do
              ffmpeg -re -i video.mp4 \
                -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
                -g 60 -c:a aac -b:a 128k -ar 44100 \
                -flvflags no_duration_filesize \
                -f flv "${{ secrets.BILI_RTMP }}"
              echo "连接断开，5秒后自动重连..."
              sleep 5
            done
          ' || true
